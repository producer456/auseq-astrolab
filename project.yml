name: AUSeq
options:
  bundleIdPrefix: com.producer456
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: "9TUXM4MBAV"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "2.1"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "2"
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  AUSeq:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.producer456.auseq2
        CODE_SIGN_ENTITLEMENTS: Sources/AUSeq.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: AstroLab
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: AstroLab
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        NSBluetoothAlwaysUsageDescription: "Connect to Bluetooth MIDI controllers."
        NSLocalNetworkUsageDescription: "Discover network MIDI devices."
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
